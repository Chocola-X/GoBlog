{{define "content"}}
<section class="login-panel">
  <h1>登录</h1>
  <p class="muted">进入 GoBlog 管理后台</p>
  {{if .Error}}<div class="notice danger">{{.Error}}</div>{{end}}
  <form method="post" class="field-stack">
    <input type="hidden" name="next" value="{{.Next}}">
    <mdui-text-field name="name" label="用户名" value="{{.Name}}" {{if fieldError .Errors "name"}}helper="{{fieldError .Errors "name"}}"{{end}} required></mdui-text-field>
    <mdui-text-field name="password" label="密码" type="password" required></mdui-text-field>
    <mdui-button type="submit" full-width>登录</mdui-button>
  </form>
</section>
{{end}}
