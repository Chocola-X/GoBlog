{{define "content"}}
<div class="page-head">
  <div>
    <h1>控制台</h1>
    <p class="muted">保持核心纯粹，把扩展交给主题和插件。</p>
  </div>
  <mdui-button href="/admin/posts/new"><mdui-icon-add slot="icon"></mdui-icon-add>写文章</mdui-button>
</div>
<section class="grid">
  <div class="stat-panel">
    <span class="muted">文章</span>
    <strong class="stat-value">{{.PostCount}}</strong>
  </div>
  <div class="stat-panel">
    <span class="muted">已编译插件</span>
    <strong class="stat-value">{{.PluginCount}}</strong>
  </div>
</section>
<section class="form-panel" style="margin-top:16px">
  <h2>插件</h2>
  {{if .Plugins}}
    {{range .Plugins}}
      <p><strong>{{.Name}}</strong> <span class="muted">v{{.Version}} · {{.Description}}</span></p>
    {{end}}
  {{else}}
    <p class="muted">暂无插件</p>
  {{end}}
</section>
{{end}}
